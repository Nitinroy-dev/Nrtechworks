    <style>*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:40px 20px;background:#0f2a1d;color:#f5f1e8;font-family:Inter,system-ui,sans-serif}.card{width:min(100%,520px);overflow:hidden;background:#f5f1e8;color:#0f2a1d;border-radius:22px;box-shadow:0 28px 80px rgba(0,0,0,.32);opacity:0;transform:translateY(24px) scale(.98);animation:pop .9s cubic-bezier(.22,1,.36,1) forwards}video{display:block;width:100%;background:#000}.content{padding:28px;text-align:center}h1{margin:0;font:38px Fraunces,Georgia,serif;font-weight:520}p{color:rgba(15,42,29,.7);line-height:1.6}a{display:inline-flex;margin-top:16px;border-radius:999px;background:#0f2a1d;color:#f5f1e8;text-decoration:none;padding:13px 26px;font-size:14px;transition:.25s ease}a:hover{background:#1a3a2a}@keyframes pop{to{opacity:1;transform:translateY(0) scale(1)}}@media(prefers-reduced-motion:reduce){.card{animation:none;opacity:1;transform:none}}</style>

  <body><main class="card"><video autoplay muted loop playsinline preload="auto" poster="/assets/thankyou-poster.jpg" aria-label="Thank you motion preview"><source src="/assets/thankyou.webm" type="video/webm" /><source src="/assets/thankyou.mp4" type="video/mp4" /></video><div class="content"><h1>Thank you!</h1><p>Your enquiry has been received. We'll get back to you within 48 hours.</p><a href="/">Back to Homepage ↗</a></div></main><script>document.querySelectorAll('video').forEach(function(video){video.muted=true;video.defaultMuted=true;video.playsInline=true;video.setAttribute('muted','');video.setAttribute('playsinline','');video.load();var play=function(){video.play().catch(function(){})};if(video.readyState>=2){play()}else{video.addEventListener('canplay',play,{once:true})}document.addEventListener('click',play,{once:true});document.addEventListener('touchstart',play,{once:true})});</script></body>
