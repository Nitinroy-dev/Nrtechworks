<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Nr Techworks Forms</title>
  </head>
  <body>
    <form name="nrtechworks-contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="nrtechworks-contact" />
      <input name="bot-field" />
      <input name="name" />
      <input name="email" />
      <input name="phone" />
      <input name="service" />
      <input name="budget" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
