# Netlify build config for TanStack Start (via Nitro).
# Nitro auto-detects Netlify and outputs a server function + static assets.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NITRO_PRESET = "netlify"

# TanStack Router handles client-side routing; SPA fallback for direct hits.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200